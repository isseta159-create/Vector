/* ════════════════════════════════════════════════════════════════════
   Personalization — goals → modules
   Answers live in settings.profile; what the app shows lives in
   settings.modules. Changing either later never touches logged data.
   ════════════════════════════════════════════════════════════════════ */
const GOAL_OPTIONS = [
  { id: "lose", label: "Lose weight", icon: I.Flame },
  { id: "gain", label: "Build muscle / gain", icon: I.Dumbbell },
  { id: "sleep", label: "Sleep better", icon: I.Moon },
  { id: "mood", label: "Mood & wellbeing", icon: I.Brain },
  { id: "vitals", label: "Heart & health vitals", icon: I.Heart },
  { id: "labs", label: "Bloodwork & biomarkers", icon: I.Beaker },
  { id: "performance", label: "Training performance", icon: I.TrendingUp }
];
const USE_OPTIONS = [
  { id: "steroids", label: "Steroids / hormones", icon: I.Syringe },
  { id: "peptides", label: "Peptides", icon: I.TestTube },
  { id: "medications", label: "Medications", icon: I.Pill },
  { id: "supplements", label: "Supplements", icon: I.Apple },
  { id: "none", label: "None of these", icon: I.Check }
];
const ALL_MODULES = { compounds: true, food: true, training: true, mood: true, health: true, labs: true, sexual: true };
const MODULE_META = [
  { id: "compounds", label: "Compounds & doses", icon: I.Syringe },
  { id: "food", label: "Food & hydration", icon: I.Apple },
  { id: "training", label: "Training", icon: I.Dumbbell },
  { id: "mood", label: "Mood", icon: I.Brain },
  { id: "health", label: "Sleep & vitals", icon: I.Heart },
  { id: "labs", label: "Bloodwork", icon: I.Beaker },
  { id: "sexual", label: "Sexual health", icon: I.Activity }
];
const deriveModules = profile => {
  const g = new Set(profile.goals || []), u = new Set(profile.uses || []);
  const usesAny = ["steroids", "peptides", "medications", "supplements"].some(x => u.has(x));
  return {
    compounds: usesAny,
    food: g.has("lose") || g.has("gain"),
    training: g.has("performance") || g.has("gain") || g.has("lose"),
    mood: g.has("mood"),
    health: g.has("sleep") || g.has("vitals") || g.has("lose") || g.has("gain"),
    labs: g.has("labs"),
    sexual: u.has("steroids")
  };
};
const usesToCats = uses => {
  const u = new Set(uses || []);
  const cats = new Set();
  if (u.has("steroids")) { cats.add("steroids"); cats.add("ancillaries"); }
  if (u.has("peptides")) cats.add("peptides");
  if (u.has("medications")) { cats.add("sleep"); cats.add("other"); }
  if (u.has("supplements")) cats.add("other");
  return cats.size ? [...cats] : null; // null = no filtering
};

const ObOption = ({ on, icon, label, onClick }) =>
  html`<button className=${"ob-opt" + (on ? " on" : "")} onClick=${() => { haptic(); onClick(); }}>
    <span className="ico"><${icon} size=${16} /></span>
    ${label}
    <span className="chk">${on ? html`<${I.Check} size=${13} strokeWidth=${3} />` : null}</span>
  </button>`;

const OnboardingFlow = ({ initial, onDone }) => {
  const [step, setStep] = useState(0);
  const [goals, setGoals] = useState(initial && initial.goals ? initial.goals : []);
  const [uses, setUses] = useState(initial && initial.uses ? initial.uses : []);
  const toggleGoal = id => setGoals(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const toggleUse = id => setUses(p => {
    if (id === "none") return p.includes("none") ? [] : ["none"];
    const next = p.filter(x => x !== "none");
    return next.includes(id) ? next.filter(x => x !== id) : [...next, id];
  });
  const mods = deriveModules({ goals, uses });
  const onModules = MODULE_META.filter(m => mods[m.id]);
  const finish = () => onDone({ goals, uses }, mods);
  return html`<div className="onboard">
    <div className="ob-in">
      ${step === 0 && html`<div className="ob-step" key="s0">
        <div className="ob-mark"><${I.Mark} size=${30} /></div>
        <div className="ob-title">Welcome to <span className="sheen">Vector</span>.</div>
        <div className="ob-sub">
          Congratulations on starting your health journey — showing up is the hard part, and you just did it.
          A few quick questions will shape Vector around what <i>you</i> care about. Under a minute, changeable anytime.

        <div style=${{ fontSize: 12, color: "var(--faint)", marginTop: 16, fontFamily: "var(--font-m)" }}>Made by Ethan Daniels</div>

      ${step === 1 && html`<div className="ob-step" key="s1">
        <div className="ob-q">What are you here for?</div>
        <div className="ob-sub" style=${{ marginTop: 5 }}>Pick everything that applies.</div>
        <div className="ob-opts">
          ${GOAL_OPTIONS.map(g => html`<${ObOption} key=${g.id} on=${goals.includes(g.id)}
            icon=${g.icon} label=${g.label} onClick=${() => toggleGoal(g.id)} />`)}
        </div>
      </div>`}
      ${step === 2 && html`<div className="ob-step" key="s2">
        <div className="ob-q">Do you use any of these toward your goals?</div>
        <div className="ob-sub" style=${{ marginTop: 5 }}>This switches on dose tracking and serum-level estimates. Private to this device.</div>
        <div className="ob-opts">
          ${USE_OPTIONS.map(u => html`<${ObOption} key=${u.id} on=${uses.includes(u.id)}
            icon=${u.icon} label=${u.label} onClick=${() => toggleUse(u.id)} />`)}
        </div>
      </div>`}
      ${step === 3 && html`<div className="ob-step" key="s3">
        <div className="ob-q">Here's your Vector.</div>
        <div className="ob-sub" style=${{ marginTop: 5 }}>Based on your answers, you'll see and track:</div>
        <div className="ob-opts">
          ${onModules.map(m => html`<div key=${m.id} className="ob-opt on" style=${{ cursor: "default" }}>
            <span className="ico"><${m.icon} size=${16} /></span>${m.label}
            <span className="chk"><${I.Check} size=${13} strokeWidth=${3} /></span>
          </div>`)}
          ${MODULE_META.filter(m => !mods[m.id]).length > 0 && html`<div style=${{ fontSize: 12.5, color: "var(--faint)", lineHeight: 1.5, padding: "4px 2px" }}>
            Everything else stays tucked away — flip any of it on later in settings, and nothing you log is ever lost by changing this.
          </div>`}
        </div>
        <div style=${{ fontSize: 12, color: "var(--faint)", marginTop: 16, fontFamily: "var(--font-m)" }}>Vector · made by Ethan Daniels</div>
      </div>`}
      <div className="ob-dots">${[0, 1, 2, 3].map(i => html`<span key=${i} className=${i === step ? "on" : ""} />`)}</div>
      <div className="ob-foot">
        ${step === 0 && html`<div>
          <${Btn} variant="primary" full onClick=${() => setStep(1)}>Get started<//>
          <button style=${{ width: "100%", textAlign: "center", padding: "13px 0 2px", fontSize: 13, color: "var(--faint)", fontWeight: 600 }}
            onClick=${() => { haptic(); onDone({ goals: [], uses: [], skipped: true }, { ...ALL_MODULES }); }}>Skip — show me everything</button>
        </div>`}
        ${step === 1 && html`<${Btn} variant="primary" full disabled=${!goals.length} onClick=${() => setStep(2)}>Continue<//>`}

      </div>
    </div>
  </div>`;
};

const TIP_ICONS = { sleep: I.Moon, recovery: I.Heart, nutrition: I.Apple, training: I.Dumbbell, labs: I.Beaker, general: I.Lightbulb };
const TipsCard = ({ allDays, settings, onOpenSettings }) => {
  const [tips, setTips] = useState(() => {
    const c = store.get("tips:" + todayKey());
    return c && Array.isArray(c.tips) ? c.tips : null;
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const attempted = useRef(false);
  const hasKey = Boolean(settings.apiKey);
  const hasData = allDays.some(d => dayHasData(d));

  const run = useCallback(async () => {
    if (!hasKey) return;
    setBusy(true); setErr("");
    try {
      const result = await generateTips(allDays, settings);
      setTips(result);
      store.set("tips:" + todayKey(), { date: todayKey(), tips: result, at: Date.now() });
      for (const k of store.list("tips:")) {
        const dk = k.slice(5);
        if (dk < todayKey(addDays(new Date(), -7))) store.del(k);
      }
    } catch (e) { setErr(String(e.message || e)); }
    finally { setBusy(false); }
  }, [allDays, settings, hasKey]);

  useEffect(() => {
    if (!tips && hasKey && hasData && !attempted.current) {
      attempted.current = true;
      run();
    }
  }, [tips, hasKey, hasData, run]);

  if (!hasData) return null;
  if (!hasKey && !tips) {
    return html`<${Card} style=${{ display: "flex", alignItems: "center", gap: 10 }}>
      <${I.Lightbulb} size=${16} style=${{ color: "var(--brand-ink)", flex: "0 0 auto" }} />
      <div style=${{ flex: 1, fontSize: 13, color: "var(--sub)", lineHeight: 1.45 }}>
        Daily tips read your last two weeks and surface one specific thing. Needs your API key.
      </div>
      <${Btn} size="sm" onClick=${onOpenSettings}>Set up<//>
    <//>`;
  }
  return html`<${Card}>
    <div style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: (busy || (tips && tips.length) || err) ? 10 : 0 }}>
      <div style=${{ display: "flex", alignItems: "center", gap: 7 }}>
        <${I.Lightbulb} size=${15} style=${{ color: "var(--brand-ink)" }} />
        <span style=${{ fontSize: 12.5, fontWeight: 700, color: "var(--brand-ink)", letterSpacing: "0.02em" }}>Today's read</span>
      </div>
      <button className="iconbtn" aria-label="Refresh tips" disabled=${busy} onClick=${() => { haptic(); run(); }}
        style=${{ width: 30, height: 30, opacity: busy ? 0.5 : 1 }}>
        <span className=${busy ? "spin" : ""} style=${{ display: "inline-flex" }}><${I.Undo} size=${14} /></span>
      </button>

    ${busy && !tips && html`<div style=${{ display: "flex", flexDirection: "column", gap: 8 }}>
      <div className="shimmer" style=${{ height: 16, width: "92%" }} />
      <div className="shimmer" style=${{ height: 16, width: "70%" }} />
    </div>`}
    ${tips && tips.length > 0 && html`<div style=${{ display: "flex", flexDirection: "column", gap: 10 }}>
      ${tips.map((tp, i) => {
        const Ico = TIP_ICONS[tp.k] || I.Lightbulb;
        return html`<div key=${i} style=${{ display: "flex", gap: 9 }}>
          <span style=${{ width: 28, height: 28, borderRadius: 9, background: "var(--inset)", color: "var(--brand-ink)",

  if (a < 0.55) return "moderate";
  if (a < 0.75) return "strong";
  return "very strong";
};

const CorrelateView = ({ allDays, mods, onTest }) => {
  const metrics = useMemo(() => CORR_METRICS.filter(m => modAllows(mods, m.mod)), [mods]);
  const t = useTheme();
  const pick = (pref, fallbackIdx) => {
    const ms = CORR_METRICS.filter(m => modAllows(mods, m.mod));
    const hit = ms.find(m => m.id === pref);
    return (hit || ms[Math.min(fallbackIdx, ms.length - 1)] || {}).id || "mood";
  };
  const [xId, setXId] = useState(() => pick("train_int", 0));
  const [yId, setYId] = useState(() => pick("hrv", 1));
  useEffect(() => {
    if (metrics.length && !metrics.some(m => m.id === xId)) setXId(metrics[0].id);
    if (metrics.length && !metrics.some(m => m.id === yId)) setYId((metrics[1] || metrics[0]).id);
  }, [metrics]);
  const [lag, setLag] = useState(1);
  const [range, setRange] = useState(90);
  const mx = metrics.find(m => m.id === xId) || CORR_METRICS[0];
  const my = metrics.find(m => m.id === yId) || CORR_METRICS[0];

  const { points, r } = useMemo(() => {
    const byKey = Object.fromEntries(allDays.map(d => [d.date, d]));
    const keys = recentKeys(range);
    const pts = [];
    for (const k of keys) {
      const dx = byKey[k];
      if (!dx) continue;
      const yKey = todayKey(addDays(dateFromKey(k), lag));
      const dy = byKey[yKey];
      if (!dy) continue;
      const tx = computeTotals(dx.meals || []);
      const ty = computeTotals(dy.meals || []);
      const xv = mx.get(dx, tx), yv = my.get(dy, ty);
      if (!xv || !yv) continue;
      pts.push({ x: xv, y: yv, d: k });
    }
    return { points: pts, r: pearson(pts.map(p => [p.x, p.y])) };
  }, [allDays, xId, yId, lag, range]);

  return html`<div style=${{ display: "flex", flexDirection: "column", gap: 12 }}>
    <${Card}>
      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <${Field} label="X — this…">
          <${Select} value=${xId} onChange=${setXId} options=${metrics.map(m => ({ value: m.id, label: m.label }))} />
        <//>
        <${Field} label="Y — against this">
          <${Select} value=${yId} onChange=${setYId} options=${metrics.map(m => ({ value: m.id, label: m.label }))} />
        <//>
      </div>
      <div style=${{ display: "grid", gridTemplateColumns: "1.3fr 1fr", gap: 12, marginTop: 13 }}>
        <${Field} label="Y measured…">
          <${Seg} value=${lag} onChange=${v => setLag(Number(v))} options=${[
            { value: 0, label: "Same day" }, { value: 1, label: "+1 day" }, { value: 2, label: "+2 days" }]} />
        <//>
        <${Field} label="Range">
          <${Seg} value=${range} onChange=${v => setRange(Number(v))} options=${[
            { value: 30, label: "30d" }, { value: 90, label: "90d" }, { value: 365, label: "1y" }]} />
        <//>
      </div>
    <//>
    <${Card} style=${{ padding: "14px 14px 8px" }}>
      ${points.length < 3
        ? html`<${Empty} icon=${I.TrendingUp} title="Not enough overlap yet"
            sub=${`Need 3+ days where both "${mx.label}" and "${my.label}" were logged${lag ? ` ${lag} day${lag > 1 ? "s" : ""} apart` : ""}.`} />`
        : html`<div>
            <div style=${{ padding: "0 4px 8px" }}>
              <div style=${{ fontFamily: "var(--font-d)", fontWeight: 700, fontSize: 20 }}>
                r = ${r == null ? "—" : (Math.round(r * 100) / 100).toFixed(2)}
              </div>
              <div style=${{ fontSize: 12.5, color: "var(--sub)", marginTop: 1 }}>
                ${r == null ? "Couldn't compute (no variance)" :
                  `${corrStrength(r)} ${r > 0 ? "positive" : "negative"} relationship · ${points.length} paired days`}
              </div>
            </div>
            <div style=${{ height: 230 }}>
              <${ResponsiveContainer}>
                <${ScatterChart} margin=${{ top: 6, right: 8, bottom: 4, left: -14 }}>
                  <${CartesianGrid} stroke=${t.chartGrid} strokeDasharray="3 5" />
                  <${XAxis} dataKey="x" type="number" name=${mx.label} domain=${["auto", "auto"]}
                    tick=${{ fill: t.chartTick, fontSize: 9.5, fontFamily: "Spline Sans Mono" }}
                    stroke=${t.chartGrid} tickLine=${false} axisLine=${{ stroke: t.chartGrid }}
                    label=${{ value: mx.label, position: "insideBottom", offset: -2, fill: t.chartTick, fontSize: 10 }} />
                  <${YAxis} dataKey="y" type="number" name=${my.label} domain=${["auto", "auto"]}
                    tick=${{ fill: t.chartTick, fontSize: 9.5, fontFamily: "Spline Sans Mono" }}
                    stroke=${t.chartGrid} tickLine=${false} axisLine=${false} width=${48} />
                  <${Tooltip} cursor=${{ strokeDasharray: "3 3", stroke: t.faint }}
                    contentStyle=${{ background: t.card, border: `1px solid ${t.line2}`, borderRadius: 12,
                      fontFamily: "Spline Sans Mono", fontSize: 11.5, color: t.ink }}
                    formatter=${(v, name) => [v, name === "x" ? mx.label : my.label]}
                    labelFormatter=${() => ""} />
                  <${Scatter} data=${points} fill=${t.brandInk} fillOpacity=${0.75} isAnimationActive=${false} />
                <//>
              <//>
            </div>
            <div style=${{ fontSize: 11.5, color: "var(--faint)", padding: "6px 4px 6px", lineHeight: 1.5 }}>
              Correlation isn't causation — but it tells you where to look.
            </div>
            ${onTest && r != null && Math.abs(r) >= 0.3 && html`<${Btn} variant="primary" full style=${{ marginTop: 4 }}
              onClick=${() => onTest({
                name: `Does ${mx.label.toLowerCase()} drive ${my.label.toLowerCase()}?`,
                outcomeId: my.id, lag, variableType: "manual"
              })}><${I.Beaker} size=${15} /> Test it as an experiment<//>`}
          </div>`}
    <//>
  </div>`;
};

const Spark = ({ values, color, width = 86, height = 26 }) => {
  if (!values || values.length < 2) return html`<span style=${{ fontSize: 11, color: "var(--faint)" }}>—</span>`;
  const lo = Math.min(...values), hi = Math.max(...values);
  const pts = values.map((v, i) =>
    `${(i / (values.length - 1) * width).toFixed(1)},${(height - 3 - (hi === lo ? 0.5 : (v - lo) / (hi - lo)) * (height - 6)).toFixed(1)}`).join(" ");
  return html`<svg width=${width} height=${height} style=${{ display: "block" }}>
    <polyline points=${pts} fill="none" stroke=${color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
  </svg>`;
};

  const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [parsed, setParsed] = useState(null);
  const recRef = useRef(null);
  useEffect(() => { if (open) { setTranscript(""); setParsed(null); setErr(""); setListening(false); } }, [open]);
  const start = () => {
    if (!SR) return;
    const rec = new SR();
    rec.continuous = true; rec.interimResults = true; rec.lang = "en-US";
    rec.onresult = e => {
      let final = "";
      for (let i = 0; i < e.results.length; i++) final += e.results[i][0].transcript;
      setTranscript(final);
    };
    rec.onend = () => setListening(false);
    rec.onerror = ev => { setErr("Mic error: " + ev.error); setListening(false); };
    recRef.current = rec;
    rec.start(); setListening(true); haptic();
  };
  const stop = () => { recRef.current && recRef.current.stop(); setListening(false); };
  const parse = async () => {
    if (!settings.apiKey) { setErr("Add your API key in settings to parse."); return; }
    setBusy(true); setErr("");
    try { setParsed(await parseVoiceLog(transcript, settings)); }
    catch (e) { setErr(String(e.message || e)); }
    finally { setBusy(false); }
  };
  const items = [];
  if (parsed) {
    (parsed.meals || []).forEach(m => items.push(`🍽 ${m.name} · ${m.kcal} kcal`));
    if (parsed.water_ml) items.push(`💧 +${parsed.water_ml} ml water`);
    (parsed.substances || []).forEach(s => {
      const lib = matchLibrary(s.name);
      items.push(lib ? `💉 ${lib.name} · ${s.dose || lib.dose}${s.unit || lib.unit}` : `⚠️ "${s.name}" — not in your library, will be skipped`);
    });
    (parsed.training || []).forEach(x => items.push(`🏋️ ${x.type} · ${x.duration} min @ ${x.intensity}`));
    if (parsed.mood && parsed.mood.mood) items.push(`🧠 mood ${parsed.mood.mood}/10`);
    if (parsed.notes) items.push(`📝 ${parsed.notes}`);
  }
  return html`<${Sheet} open=${open} onClose=${onClose} title="Voice log" sub="Say it like you'd say it to a training partner"
    foot=${parsed && items.length ? (close => html`<${Btn} variant="primary" full onClick=${() => onApply(parsed)}>Log it all<//>`) : null}>
    ${!SR && html`<div style=${{ fontSize: 12.5, color: "var(--warn)", marginBottom: 10 }}>
      Speech recognition isn't available in this browser — type instead.</div>`}
    <textarea className="textarea" rows="3" value=${transcript} placeholder=${'"Two eggs and oatmeal, 500 water, test e 100 left delt, push day 70 minutes, mood\'s a 7"'}
      onChange=${e => setTranscript(e.target.value)} />
    <div style=${{ display: "flex", gap: 10, marginTop: 11 }}>
      ${SR && html`<${Btn} variant=${listening ? "danger" : "tonal"} style=${{ flex: 1 }} onClick=${listening ? stop : start}>
        ${listening ? "Stop" : html`<${I.Waves} size=${15} /> Speak`}<//>`}
      <${Btn} variant="primary" style=${{ flex: 1.4 }} disabled=${busy || !transcript.trim()} onClick=${parse}>
        ${busy ? html`<span key="s" className="spin" style=${{ display: "inline-flex" }}><${I.Loader} size=${14} /></span>` : html`<${I.Sparkles} key="i" size=${14} /> Parse`}
      <//>
    </div>
    ${err && html`<div style=${{ fontSize: 12.5, color: "var(--warn)", marginTop: 9 }}>${err}</div>`}
    ${parsed && html`<div style=${{ marginTop: 13 }}>
      <div className="list-head" style=${{ padding: "0 0 6px" }}>Ready to log</div>
      ${items.length ? items.map((s, i) => html`<div key=${i} style=${{ fontSize: 13.5, padding: "5px 0" }}>${s}</div>`)
        : html`<div style=${{ fontSize: 13, color: "var(--faint)" }}>Couldn't pull anything loggable out of that.</div>`}
    </div>`}
  <//>`;
};

const computeRecentSubs = allDays => {
  const cutoff = new Set(recentKeys(14));
  const freq = {}, lastEntry = {};
  for (const d of allDays) {
    if (!cutoff.has(d.date)) continue;
    for (const s of d.substances || []) {
      const lid = s.libraryId || s.id;
      freq[lid] = (freq[lid] || 0) + 1;
      const prev = lastEntry[lid];
      if (!prev || d.date >= prev.date) lastEntry[lid] = { date: d.date, s };
    }
  }
  return Object.keys(freq)
    .sort((a, b) => freq[b] - freq[a])
    .map(lid => {
      const lib = LIBRARY.find(x => x.id === lid);
      if (!lib) return null;
      const last = lastEntry[lid] && lastEntry[lid].s;
      return { ...lib, dose: (last && last.dose) || lib.dose, unit: (last && last.unit) || lib.unit, route: (last && last.route) || lib.route };
    })
    .filter(Boolean)
    .slice(0, 6);
};

    store.set(`log:${nextDay.date}`, nextDay);
  }, []);

  /* Toast with optional undo */
  const toast = useCallback((msg, undo) => {
    undoRef.current = undo || null;
    setToastItem({ id: Date.now(), msg, undo: Boolean(undo) });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastItem(null), undo ? 5000 : 2400);
  }, []);
  const onUndo = useCallback(() => {
    if (undoRef.current) undoRef.current();
    undoRef.current = null;
    setToastItem(null);
    haptic();
  }, []);

  const onPickSubstance = sub => {
    setPickerPrefill({ ...sub });
    setPickerOpen(false);
    setQuickOpen(false);
    setEditorOpen(true);
  };
  const onSaveSubstance = entry => {
    const newSub = {
      id: uid(),
      libraryId: entry.id,
      name: entry.name,
      cat: entry.cat,
      h: entry.h,
      dose: Number(entry.dose) || 0,
      unit: entry.unit,
      route: entry.route,
      time: entry.time,
      notes: entry.notes || ""
    };
    setDay({ ...day, substances: [...(day.substances || []), newSub] });
    setEditorOpen(false);
    setPickerPrefill(null);
    toast(`Logged ${entry.name}`);
  };
  const onClearAll = () => {
    store.clearAll();
    setDays({});
    setSettings({
      apiKey: "",
      macroModel: "claude-haiku-4-5-20251001",
      insightsModel: "claude-sonnet-4-6",
      theme: "auto",
      targets: { ...DEFAULT_TARGETS }
    });
  };
  const quickWater = amt => {
    const prev = day.hydration_ml || 0;
    setDay({ ...day, hydration_ml: prev + amt });
    setQuickOpen(false);
    toast(`+${amt} ml water`, () => setDay({ ...day, hydration_ml: prev }));
  };
  const quickMeal = m => {
    const prev = day.meals || [];
    setDay({ ...day, meals: [...prev, { name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat, id: uid(), time: nowTime() }] });
    setQuickOpen(false);
    toast(`Logged ${m.name} · ${m.kcal} kcal`, () => setDay({ ...day, meals: prev }));
  };
  const saveLabs = (date, entries) => {
    const target = migrateDay(days[date] || blankDay(date));
    const existing = (target.labs || []).filter(l => !entries.some(e => e.marker === l.marker));
    const added = entries.map(e => {
      const m = markerById(e.marker);
      return { id: uid(), marker: e.marker, value: e.value, unit: m ? m.unit : "", time: nowTime() };
    });
    setDay({ ...target, labs: [...existing, ...added] });
    setLabOpen(false);
    toast(`Saved ${entries.length} result${entries.length === 1 ? "" : "s"}`);
  };
  const deleteDraw = dateKey => {
    const target = days[dateKey];
    if (!target) return;
    const prevLabs = target.labs || [];
    setDay({ ...target, labs: [] });
    toast(`Deleted draw ${fmtDate(dateFromKey(dateKey))}`, () => setDay({ ...target, labs: prevLabs }));
  };
  const applyHealthImport = (perDay, overwrite) => {
    let fieldsApplied = 0, daysTouched = 0;
    const updates = {};
    for (const [dateK, patch] of Object.entries(perDay)) {
      const target = migrateDay(JSON.parse(JSON.stringify(days[dateK] || blankDay(dateK))));
      let touched = false;
      for (const [f, v] of Object.entries(patch)) {
        const cur = target.health[f];
        const empty = cur === 0 || cur === "" || cur == null;
        if (overwrite || empty) {
          target.health[f] = v;
          fieldsApplied++; touched = true;
        }
      }
      if (touched) {
        if (target.health.sleep_start && target.health.sleep_end && !patch.sleep_hours && !target.health.sleep_hours) {
          target.health.sleep_hours = computeSleepHours(target.health.sleep_start, target.health.sleep_end, target.health.awake_min);
        }
        updates[dateK] = target;
        store.set(`log:${dateK}`, target);
        daysTouched++;
      }
    }
    if (daysTouched) setDays(prev => ({ ...prev, ...updates }));
    if (daysTouched) setSettings(s => ({ ...s, lastHealthImport: todayKey() }));
    setImportOpen(false);
    toast(daysTouched ? `Imported ${fieldsApplied} values across ${daysTouched} day${daysTouched === 1 ? "" : "s"}` : "Nothing new to import");
  };
  const quickJump = section => {
    setQuickOpen(false);
    setTab("log");
    setLogSection(section);
  };
  const saveExp = e => {
    setExperiments(prev => {
      const next = prev.some(x => x.id === e.id) ? prev.map(x => x.id === e.id ? { ...x, ...e } : x) : [...prev, e];
      store.set("experiments", next);
      return next;
    });
    toast("Experiment saved");
  };
  const markExpToday = e => {
    const k = todayKey();
    setExperiments(prev => {
      const next = prev.map(x => x.id === e.id ? { ...x, marks: { ...(x.marks || {}), [k]: !(x.marks && x.marks[k]) } } : x);
      store.set("experiments", next);
      return next;
    });
    haptic();
  };
  const archiveExp = e => {
    const prevList = experiments;
    const next = experiments.map(x => x.id === e.id ? { ...x, archived: true } : x);
    setExperiments(next); store.set("experiments", next);
    toast(`Archived "${e.name}"`, () => { setExperiments(prevList); store.set("experiments", prevList); });
  };
  const addCommit = msg => {
    const next = [{ id: uid(), date: todayKey(), msg }, ...commits];
    setCommits(next); store.set("commits", next);
    toast("Change logged — ✦ on your charts");
  };
  const delCommit = c => {
    const prev = commits;
    const next = commits.filter(x => x.id !== c.id);
    setCommits(next); store.set("commits", next);
    toast("Commit removed", () => { setCommits(prev); store.set("commits", prev); });
  };
  const applyVoice = parsed => {
    let next = { ...day };
    const bits = [];
    if (Array.isArray(parsed.meals) && parsed.meals.length) {
      next.meals = [...(next.meals || []), ...parsed.meals.map(m => ({
        name: m.name || "Meal", kcal: Number(m.kcal) || 0, protein: Number(m.protein) || 0,
        carbs: Number(m.carbs) || 0, fat: Number(m.fat) || 0, id: uid(), time: nowTime() }))];
      bits.push(`${parsed.meals.length} meal${parsed.meals.length === 1 ? "" : "s"}`);
    }
    if (parsed.water_ml > 0) { next.hydration_ml = (next.hydration_ml || 0) + Number(parsed.water_ml); bits.push(`+${parsed.water_ml} ml`); }
    if (Array.isArray(parsed.substances)) {
      const adds = [];
      for (const s of parsed.substances) {
        const lib = matchLibrary(s.name);
        if (!lib) continue;
        adds.push({ id: uid(), libraryId: lib.id, name: lib.name, cat: lib.cat, h: lib.h,
          dose: Number(s.dose) || lib.dose, unit: s.unit || lib.unit, route: lib.route, time: nowTime(), notes: "via voice" });
      }
      if (adds.length) { next.substances = [...(next.substances || []), ...adds]; bits.push(`${adds.length} dose${adds.length === 1 ? "" : "s"}`); }
    }
    if (Array.isArray(parsed.training) && parsed.training.length) {
      next.training = [...(Array.isArray(next.training) ? next.training : []), ...parsed.training.map(x => ({
        id: uid(), type: TRAINING_TYPES.includes(x.type) ? x.type : "full", duration: Number(x.duration) || 60,
        intensity: Math.min(10, Number(x.intensity) || 7), notes: "", time: nowTime() }))];
      bits.push("training");
    }
    if (parsed.mood && parsed.mood.mood > 0) { next.mood = { ...next.mood, mood: Math.min(10, Number(parsed.mood.mood)) }; bits.push("mood"); }
    if (parsed.notes) next.notes = (next.notes ? next.notes + "\n" : "") + parsed.notes;
    setDay(next);
    setVoiceOpen(false);
    toast(bits.length ? `Logged ${bits.join(", ")}` : "Nothing to log");
  };
  const stampDay = (moodV, line) => {
    let next = { ...day, closed: true };
    if (mods.mood && moodV > 0) next.mood = { ...next.mood, mood: moodV };
    if (line) next.notes = (next.notes ? next.notes + "\n" : "") + line;
    setDay(next);
    setCloseOpen(false);
    if (navigator.vibrate) navigator.vibrate([12, 55, 35]);
    clickSound(settings.sounds);
    setDawnOn(Date.now());
    setTimeout(() => setDawnOn(0), 1200);
    toast("Day stamped ✦");
  };
  const [glanceOpen, setGlanceOpen] = useState(false);
  const [dawnOn, setDawnOn] = useState(0);
  const onCompanionAction = a => {
    haptic();
    if (a.kind === "dose") {
      const p = a.payload;
      const newSub = { id: uid(), libraryId: p.id, name: p.name, cat: p.cat, h: p.h,
        dose: Number(p.dose) || 0, unit: p.unit, route: p.route, time: nowTime(), notes: "" };
      const prev = day.substances || [];
      setDay({ ...day, substances: [...prev, newSub] });
      toast(`Logged ${p.name} · ${fmtDose(p.dose, p.unit)}`, () => setDay({ ...day, substances: prev }));
    } else if (a.kind === "meal") {
      quickMeal(a.payload);
    } else if (a.kind === "training") {
      const prev = Array.isArray(day.training) ? day.training : [];
      setDay({ ...day, training: [...prev, { ...a.payload, id: uid(), notes: "", time: nowTime() }] });
      toast(`Logged ${a.payload.type} · ${a.payload.duration} min`, () => setDay({ ...day, training: prev }));
    } else if (a.kind === "water") {
      const prev = day.hydration_ml || 0;
      setDay({ ...day, hydration_ml: prev + 500 });
      toast("+500 ml water", () => setDay({ ...day, hydration_ml: prev }));
    } else if (a.kind === "jump") {
      setTab("log"); setLogSection(a.payload.section);
    } else if (a.kind === "import") {
      setImportOpen(true);
    } else if (a.kind === "expmark") {
      markExpToday(a.payload);
      toast(`Marked "${a.payload.name}" done`);
    } else if (a.kind === "close") {
      setCloseOpen(true);
    }
  };
  const onTestCorr = draft => {
    setExpDraft(draft);
    setInsightsForce({ mode: "experiments" });
    setTab("insights");
  };
  /* Environment auto-log: once per day when enabled */
  useEffect(() => {
    const env = settings.env;
    if (!env || !env.enabled || store.get("envday") === todayKey()) return;
    fetchEnvironment(env.lat, env.lon).then(perDay => {
      const updates = {};
      for (const [dk, e] of Object.entries(perDay)) {
        const target = migrateDay(days[dk] || blankDay(dk));
        target.env = { ...(target.env || {}), ...e };
        updates[dk] = target;
        store.set(`log:${dk}`, target);
      }
      if (Object.keys(updates).length) setDays(prev => ({ ...prev, ...updates }));
      store.set("envday", todayKey());
    }).catch(() => {});
  }, [settings.env]);

  const isToday = currentDate === todayKey();

  if (locked) {
    return html`<${ThemeCtx.Provider} value=${theme}>
      <${PinLock} pinHash=${settings.pinHash}
        onUnlock=${() => { sessionStorage.setItem("vecUnlocked", "1"); setLocked(false); haptic(); }} />
    <//>`;
  }

  return html`<${ThemeCtx.Provider} value=${theme}>
    <${ToastCtx.Provider} value=${toast}>
      <div style=${{ minHeight: "100dvh", paddingBottom: 120 }}>
        <header className="hdr">
          <div className="hdr-in">
            <div className="hdr-row">
              <div style=${{ display: "flex", alignItems: "center", gap: 9 }}>
                <span style=${{ width: 30, height: 30, borderRadius: 10, background: "var(--brand)",
                  color: "var(--on-brand)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <${I.Mark} size=${17} />
                </span>
                <div>
                  <div style=${{ fontFamily: "var(--font-d)", fontWeight: 800, fontSize: 17, lineHeight: 1.1, letterSpacing: "0.01em" }}>VECTOR</div>
                  <div style=${{ fontFamily: "var(--font-m)", fontSize: 10, color: "var(--sub)", lineHeight: 1.3, letterSpacing: "0.1em", textTransform: "uppercase" }}>${fmtDateLong(dateFromKey(currentDate))}</div>
                </div>
              </div>
              <div style=${{ display: "flex", alignItems: "center", gap: 11 }}>
              <${StatClock} />
              <button className="iconbtn" aria-label="Settings" onClick=${() => { haptic(); setSettingsOpen(true); }}>
                <${I.Settings} size=${17} />
              </button>
              </div>
            </div>
            <${WeekStrip} currentDate=${currentDate} days=${days} onPick=${setCurrentDate} />
          </div>
        </header>

        ${!isToday && html`<div className="hdr-in"><div className="pastbar">
          <span>Viewing <b>${fmtDate(dateFromKey(currentDate))}</b></span>
          <button onClick=${() => { haptic(); setCurrentDate(todayKey()); }}>Back to today</button>
        </div></div>`}

        <main className="hdr-in view-anim" key=${tab} style=${{ paddingTop: 12 }}>
          ${tab === "today" && html`<${TodayView} day=${day} allDays=${allDays} settings=${settings} mods=${mods}
            experiments=${experiments} onCloseDay=${() => setCloseOpen(true)}
            onJump=${s => { setTab("log"); setLogSection(s); }}
            onOpenGlance=${() => setGlanceOpen(true)}
            onCompanionAction=${onCompanionAction}
            onOpenSettings=${() => setSettingsOpen(true)} />`}
          ${tab === "log" && html`<${LogView} day=${day} settings=${settings} activeSection=${logSection} mods=${mods}
            onSection=${setLogSection} onSetDay=${setDay} onOpenPicker=${() => setPickerOpen(true)}
            onOpenImport=${() => setImportOpen(true)} mealSugs=${mealSugs} />`}
          ${tab === "trends" && html`<${TrendsView} allDays=${allDays} mods=${mods} commits=${commits}
            onTestCorr=${onTestCorr}
            onAddLab=${() => setLabOpen(true)} onDeleteDraw=${deleteDraw} />`}
          ${tab === "insights" && html`<${InsightsView} allDays=${allDays} settings=${settings} mods=${mods}
            experiments=${experiments} onSaveExp=${saveExp} onMarkToday=${markExpToday} onArchive=${archiveExp}
            onUpdateSettings=${patch => setSettings(s => ({ ...s, ...patch }))}
            externalDraft=${expDraft} onConsumeDraft=${() => setExpDraft(null)} forceMode=${insightsForce} />`}
          <div className="byline">Made by Ethan Daniels</div>
        </main>

        <${Dock} tab=${tab} onTab=${setTab} onPlus=${() => setQuickOpen(true)} />
        <${ToastHost} toast=${toastItem} onUndo=${onUndo} />

        <${QuickAddSheet} open=${quickOpen} onClose=${() => setQuickOpen(false)}
          recent=${recentSubs} mealSugs=${mealSugs} doseSugs=${doseSugs} mods=${mods}
          onWater=${quickWater}
          onDose=${onPickSubstance}
          onMeal=${quickMeal}
          onBrowse=${() => { setQuickOpen(false); setPickerOpen(true); }}
          onAddLab=${() => { setQuickOpen(false); setLabOpen(true); }}
          onVoice=${() => { setQuickOpen(false); setVoiceOpen(true); }}
          onCloseDay=${() => { setQuickOpen(false); setCloseOpen(true); }}
          dayClosed=${Boolean(day.closed)} hasKey=${Boolean(settings.apiKey)}
          onJump=${quickJump} />
        <${VoiceLogSheet} open=${voiceOpen} onClose=${() => setVoiceOpen(false)} settings=${settings} onApply=${applyVoice} />
        ${dawnOn > 0 && html`<div key=${dawnOn} className="dawnflash" aria-hidden="true" />`}
        <${VitalsGlance} open=${glanceOpen} onClose=${() => setGlanceOpen(false)} allDays=${allDays}
          onOpenImport=${() => { setGlanceOpen(false); setImportOpen(true); }}
          onJumpHealth=${() => { setGlanceOpen(false); setTab("log"); setLogSection("health"); }} />
        <${CloseDaySheet} open=${closeOpen} onClose=${() => setCloseOpen(false)} day=${day} allDays=${allDays} mods=${mods} onStamp=${stampDay} />
        <${AddLabSheet} open=${labOpen} onClose=${() => setLabOpen(false)}
          onSave=${saveLabs} defaultDate=${currentDate} settings=${settings} />
        <${HealthImportSheet} open=${importOpen} onClose=${() => setImportOpen(false)}
          onApply=${applyHealthImport} />
        <${SubstancePicker} open=${pickerOpen} onClose=${() => setPickerOpen(false)}
          onPick=${onPickSubstance} recent=${recentSubs}
          visibleCats=${settings.profile && !settings.profile.grandfathered && !settings.profile.skipped ? usesToCats(settings.profile.uses) : null} />
        <${SubstanceEditor} open=${editorOpen}
          onClose=${() => { setEditorOpen(false); setPickerPrefill(null); }}
          onSave=${onSaveSubstance} prefill=${pickerPrefill}
          dateLabel=${isToday ? "today" : fmtDate(dateFromKey(currentDate))} />
        <${SettingsSheet} open=${settingsOpen} onClose=${() => setSettingsOpen(false)}
          settings=${settings} onChange=${setSettings} onClearAll=${onClearAll}
          onOpenHealthImport=${() => { setSettingsOpen(false); setImportOpen(true); }}
          onRerunSetup=${() => { setSettingsOpen(false); setSetupOpen(true); }}
          commits=${commits} onAddCommit=${addCommit} onDelCommit=${delCommit} />
        ${showOnboarding && html`<${OnboardingFlow} initial=${settings.profile} onDone=${onSetupDone} />`}
      </div>
    <//>
  <//>`;
};

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
